version: 1
preset: node

build:
  pnpm:
    nodeVersion: 20.19.2
    packageName: "@services/svc-profile"
    steps:
      - type: lint
        name: Lint service sources
      - type: build
        name: Build service package

image:
  repository: registry.leultewolde.com/mereb/svc-profile
  context: .
  dockerfile: Dockerfile
  tagStrategy: branch-sha
  tagTemplate: "{{tagName}}"
  push:
    enabled: true
    when: '!pr'
    credentialsId: docker-registry-local
    registry: http://10.0.0.222:30400

deploy:
  order:
    - dev
    - dev_outbox
    - stg
    - stg_outbox
    - prd
    - prd_outbox

  dev:
    release: svc-profile-dev
    namespace: apps-dev
    chart: app-chart
    repo: https://charts.leultewolde.com
    repoCredentialId: helm-chart-creds
    valuesFiles:
      - .ci/values-dev.yaml
      - .ci/.rendered/values-dev.secret.yaml
    valuesTemplates:
      - template: .ci/templates/values-secret.yaml.tpl
        output: .ci/.rendered/values-dev.secret.yaml
        vars:
          SECRET_NAME: svc-profile-dev-secrets
          DATABASE_URL:
            vaultPath: kv/data/apps/dev
            vaultField: PROFILE_DATABASE_URL
          KEYCLOAK_WEBHOOK_SECRET:
            vaultPath: kv/data/apps/dev
            vaultField: KEYCLOAK_WEBHOOK_SECRET
          KEYCLOAK_WEBHOOK_BASIC_USER:
            vaultPath: kv/data/apps/dev
            vaultField: KEYCLOAK_WEBHOOK_BASIC_USER
          KEYCLOAK_WEBHOOK_BASIC_PASS:
            vaultPath: kv/data/apps/dev
            vaultField: KEYCLOAK_WEBHOOK_BASIC_PASS
          SPLUNK_HEC_TOKEN:
            vaultPath: kv/data/apps/dev
            vaultField: SPLUNK_HEC_TOKEN
    vault:
      url: https://vault.leultewolde.com
      tokenEnv: VAULT_TOKEN
      engine: kv2
    credentials:
      - type: vaultToken
        id: vault-credentials
        env: VAULT_TOKEN
    when: branch=main & !pr
    autoPromote: true
    smoke:
      url: https://api-dev.mereb.app/profile/healthz
      retries: 3
      delay: 10
      timeout: 60s

  dev_outbox:
    release: svc-profile-dev-outbox
    namespace: apps-dev
    chart: app-chart
    repo: https://charts.leultewolde.com
    repoCredentialId: helm-chart-creds
    valuesFiles:
      - .ci/values-dev.yaml
      - .ci/values-outbox-worker.yaml
    when: branch=main & !pr
    autoPromote: true
    notes: "Dedicated outbox relay worker deployment"

  stg:
    release: svc-profile-stg
    namespace: apps-stg
    chart: app-chart
    repo: https://charts.leultewolde.com
    repoCredentialId: helm-chart-creds
    valuesFiles:
      - .ci/values-stg.yaml
      - .ci/.rendered/values-stg.secret.yaml
    valuesTemplates:
      - template: .ci/templates/values-secret.yaml.tpl
        output: .ci/.rendered/values-stg.secret.yaml
        vars:
          SECRET_NAME: svc-profile-stg-secrets
          DATABASE_URL:
            vaultPath: kv/data/apps/stg
            vaultField: PROFILE_DATABASE_URL
          KEYCLOAK_WEBHOOK_SECRET:
            vaultPath: kv/data/apps/stg
            vaultField: KEYCLOAK_WEBHOOK_SECRET
          KEYCLOAK_WEBHOOK_BASIC_USER:
            vaultPath: kv/data/apps/stg
            vaultField: KEYCLOAK_WEBHOOK_BASIC_USER
          KEYCLOAK_WEBHOOK_BASIC_PASS:
            vaultPath: kv/data/apps/stg
            vaultField: KEYCLOAK_WEBHOOK_BASIC_PASS
          SPLUNK_HEC_TOKEN:
            vaultPath: kv/data/apps/stg
            vaultField: SPLUNK_HEC_TOKEN
    vault:
      url: https://vault.leultewolde.com
      tokenEnv: VAULT_TOKEN
      engine: kv2
    credentials:
      - type: vaultToken
        id: vault-credentials
        env: VAULT_TOKEN
    when: branch=main & !pr
    autoPromote: true
    approval:
      before: true
      message: "Promote svc-profile deployment to staging?"
      submitter: release-managers
    smoke:
      url: https://api-stg.mereb.app/profile/healthz
      retries: 3
      delay: 10
      timeout: 60s

  stg_outbox:
    release: svc-profile-stg-outbox
    namespace: apps-stg
    chart: app-chart
    repo: https://charts.leultewolde.com
    repoCredentialId: helm-chart-creds
    valuesFiles:
      - .ci/values-stg.yaml
      - .ci/values-outbox-worker.yaml
    when: branch=main & !pr
    autoPromote: true
    notes: "Dedicated outbox relay worker deployment"

  prd:
    release: svc-profile
    namespace: apps-prd
    chart: app-chart
    repo: https://charts.leultewolde.com
    repoCredentialId: helm-chart-creds
    valuesFiles:
      - .ci/values-prd.yaml
      - .ci/.rendered/values-prd.secret.yaml
    valuesTemplates:
      - template: .ci/templates/values-secret.yaml.tpl
        output: .ci/.rendered/values-prd.secret.yaml
        vars:
          SECRET_NAME: svc-profile-secrets
          DATABASE_URL:
            vaultPath: kv/data/apps/prd
            vaultField: PROFILE_DATABASE_URL
          KEYCLOAK_WEBHOOK_SECRET:
            vaultPath: kv/data/apps/prd
            vaultField: KEYCLOAK_WEBHOOK_SECRET
          KEYCLOAK_WEBHOOK_BASIC_USER:
            vaultPath: kv/data/apps/prd
            vaultField: KEYCLOAK_WEBHOOK_BASIC_USER
          KEYCLOAK_WEBHOOK_BASIC_PASS:
            vaultPath: kv/data/apps/prd
            vaultField: KEYCLOAK_WEBHOOK_BASIC_PASS
          SPLUNK_HEC_TOKEN:
            vaultPath: kv/data/apps/prd
            vaultField: SPLUNK_HEC_TOKEN
    vault:
      url: https://vault.leultewolde.com
      tokenEnv: VAULT_TOKEN
      engine: kv2
    credentials:
      - type: vaultToken
        id: vault-credentials
        env: VAULT_TOKEN
    when: tag=^v[0-9].*
    autoPromote: false
    approval:
      message: "Deploy svc-profile to production?"
      submitter: release-managers
    smoke:
      url: https://api.mereb.app/profile/healthz
      retries: 3
      delay: 10
      timeout: 60s

  prd_outbox:
    release: svc-profile-outbox
    namespace: apps-prd
    chart: app-chart
    repo: https://charts.leultewolde.com
    repoCredentialId: helm-chart-creds
    valuesFiles:
      - .ci/values-prd.yaml
      - .ci/values-outbox-worker.yaml
    when: tag=^v[0-9].*
    autoPromote: true
    notes: "Dedicated outbox relay worker deployment"

signing:
  enabled: false

release:
  autoTag:
    enabled: true
    when: branch=main & !pr
    prefix: v
    bump: patch
    remote: origin
    gitUser: Mereb CI
    gitEmail: ci@mereb.dev
    credentialId: github-credentials
    clean: false
    allowDirty: true
    skipIfTagged: true
    afterEnvironment: stg
  github:
    enabled: true
    when: tag=^v[0-9].*
    repo: leultewolde/mereb-svc-profile
    stageName: GitHub Release
    credentialId: github-credentials
    generateReleaseNotes: true
