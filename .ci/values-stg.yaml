nameOverride: svc-profile

replicaCount: 1

imagePullSecrets:
  - regcred

image:
  repository: registry.leultewolde.com/mereb/svc-profile
  env:
    - name: NODE_ENV
      value: production
    - name: SERVICE_NAME
      value: svc-profile
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: http://otel-collector-stg.platform-stg.svc.cluster.local:4318
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      value: http/protobuf
    - name: OTEL_EXPORTER_OTLP_TRACES_PROTOCOL
      value: http/protobuf
    - name: OIDC_ISSUER
      valueFrom:
        configMapKeyRef:
          name: platform-identity-stg
          key: OIDC_ISSUER
    - name: KEYCLOAK_WEBHOOK_CLIENT_IDS
      valueFrom:
        configMapKeyRef:
          name: platform-identity-stg
          key: KEYCLOAK_WEBHOOK_CLIENT_IDS
    - name: KEYCLOAK_WEBHOOK_SECRET
      valueFrom:
        secretKeyRef:
          name: platform-identity-stg-secrets
          key: PROFILE_BOOTSTRAP_SHARED_SECRET
  envFrom:
    - configMapRef:
        name: svc-profile-stg-config
    - secretRef:
        name: svc-profile-stg-secrets
        optional: false

vaultSecretsOperator:
  enabled: true
  auth:
    create: true
    spec:
      vaultAuthGlobalRef:
        name: mereb-apps-stg
        namespace: vault-secrets-operator
      kubernetes:
        role: apps-stg-svc-profile
      mount: kubernetes-stg
  staticSecrets:
    - name: svc-profile-runtime
      spec:
        type: kv-v2
        mount: kv
        path: apps/stg
        refreshAfter: 5m
        destination:
          name: svc-profile-stg-secrets
          create: true
          overwrite: true
          transformation:
            excludes:
              - .*
            templates:
              DATABASE_URL:
                text: '{{- get .Secrets "PROFILE_DATABASE_URL" -}}'
              KEYCLOAK_WEBHOOK_SECRET:
                text: '{{- get .Secrets "KEYCLOAK_WEBHOOK_SECRET" -}}'
              KEYCLOAK_WEBHOOK_BASIC_USER:
                text: '{{- get .Secrets "KEYCLOAK_WEBHOOK_BASIC_USER" -}}'
              KEYCLOAK_WEBHOOK_BASIC_PASS:
                text: '{{- get .Secrets "KEYCLOAK_WEBHOOK_BASIC_PASS" -}}'
              SPLUNK_HEC_TOKEN:
                text: '{{- get .Secrets "SPLUNK_HEC_TOKEN" -}}'
        rolloutRestartTargets:
          - kind: Deployment
            name: svc-profile-stg

service:
  ports:
    - name: http
      port: 80
      targetPort: http
      containerPort: 4001

ingress:
  enabled: true
  className: kong
  annotations:
    kubernetes.io/ingress.class: kong
    cert-manager.io/cluster-issuer: letsencrypt-http
    konghq.com/strip-path: "true"
  hosts:
    - host: api-stg.mereb.app
      paths:
        - path: /profile
          pathType: Prefix
          servicePort: http
  tls:
    - secretName: profile-stg-tls
      hosts:
        - api-stg.mereb.app

configMap:
  enabled: true
  nameOverride: svc-profile-stg-config
  data:
    PORT: "4001"
    PROFILE_EVENTS_ENABLED: "true"
    MEDIA_SERVICE_URL: http://svc-media-stg.apps-stg.svc.cluster.local
    MEDIA_CDN_ORIGIN: https://uploads-stg.mereb.app/media-stg
    KAFKA_BROKERS: platform-stg-redpanda-0.platform-stg-redpanda.platform-stg.svc.cluster.local:9092
    KAFKA_SSL: "true"
    KAFKA_SSL_INSECURE: "true"
    OIDC_AUDIENCE: account
    SPLUNK_HEC_URL: https://splunk-hec.mereb.app/services/collector/event
    SPLUNK_HEC_INDEX: logs-stg

resources:
  requests:
    cpu: 15m
    memory: 96Mi
  limits:
    cpu: 150m
    memory: 256Mi
