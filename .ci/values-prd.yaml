nameOverride: svc-profile

replicaCount: 2

deploymentStrategy:
  type: RollingUpdate
  rollingUpdate:
    maxSurge: 0
    maxUnavailable: 1

imagePullSecrets:
  - regcred

image:
  repository: registry.leultewolde.com/mereb/svc-profile
  env:
    - name: NODE_ENV
      value: production
    - name: SERVICE_NAME
      value: svc-profile
    - name: OTEL_EXPORTER_OTLP_ENDPOINT
      value: http://otel-collector.platform-prd.svc.cluster.local:4318
    - name: OTEL_EXPORTER_OTLP_PROTOCOL
      value: http/protobuf
    - name: OTEL_EXPORTER_OTLP_TRACES_PROTOCOL
      value: http/protobuf
    - name: OIDC_ISSUER
      valueFrom:
        configMapKeyRef:
          name: platform-identity-prd
          key: OIDC_ISSUER
    - name: KEYCLOAK_WEBHOOK_CLIENT_IDS
      valueFrom:
        configMapKeyRef:
          name: platform-identity-prd
          key: KEYCLOAK_WEBHOOK_CLIENT_ID
  envFrom:
    - configMapRef:
        name: svc-profile-prd-config
    - secretRef:
        name: svc-profile-secrets
        optional: true

service:
  ports:
    - name: http
      port: 80
      targetPort: http
      containerPort: 4001

ingress:
  enabled: true
  className: kong
  annotations:
    kubernetes.io/ingress.class: kong
    cert-manager.io/cluster-issuer: letsencrypt-http
    konghq.com/strip-path: "true"
  hosts:
    - host: api.mereb.app
      paths:
        - path: /profile
          pathType: Prefix
          servicePort: http
  tls:
    - secretName: profile-prd-tls
      hosts:
        - api.mereb.app

configMap:
  enabled: true
  nameOverride: svc-profile-prd-config
  data:
    PORT: "4001"
    PROFILE_EVENTS_ENABLED: "true"
    MEDIA_SERVICE_URL: http://svc-media.apps-prd.svc.cluster.local
    KAFKA_BROKERS: platform-prd-redpanda-0.platform-prd-redpanda.platform-prd.svc.cluster.local:9092,platform-prd-redpanda-1.platform-prd-redpanda.platform-prd.svc.cluster.local:9092,platform-prd-redpanda-2.platform-prd-redpanda.platform-prd.svc.cluster.local:9092
    KAFKA_SSL: "true"
    KAFKA_SSL_INSECURE: "true"
    OIDC_AUDIENCE: account
    SPLUNK_HEC_URL: https://splunk-hec.mereb.app/services/collector/event
    SPLUNK_HEC_INDEX: logs-prd

resources:
  requests:
    cpu: 75m
    memory: 224Mi
  limits:
    cpu: 400m
    memory: 512Mi

autoscaling:
  enabled: true
  minReplicas: 2
  maxReplicas: 2
  targetCPUUtilizationPercentage: 70
