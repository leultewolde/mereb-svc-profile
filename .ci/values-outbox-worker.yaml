replicaCount: 1

podLabels:
  mereb.dev/workload-role: outbox-relay

image:
  args:
    - node
    - dist/outboxRelayWorker.js

service:
  enabled: false
  ports: []

ingress:
  enabled: false

autoscaling:
  enabled: false

serviceMonitor:
  enabled: false

# Reuse the main service's config/secret via envFrom refs from the base env values file.
configMap:
  enabled: false

secret:
  enabled: false
