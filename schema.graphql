scalar FieldSet

directive @external on FIELD_DEFINITION
directive @provides(fields: FieldSet) on FIELD_DEFINITION
directive @key(fields: FieldSet) repeatable on OBJECT | INTERFACE
directive @extends on OBJECT | INTERFACE

scalar _Any

type User @key(fields: "id") {
  id: ID!
  handle: String!
  displayName: String!
  bio: String
  avatarUrl: String
  followers(after: String, limit: Int = 20): UserConnection!
  following(after: String, limit: Int = 20): UserConnection!
  followersCount: Int!
  followingCount: Int!
  followedByMe: Boolean!
  createdAt: String!
}

type UserEdge {
  node: User!
  cursor: String!
}

type UserPageInfo {
  endCursor: String
  hasNextPage: Boolean!
}

type UserConnection {
  edges: [UserEdge!]!
  pageInfo: UserPageInfo!
}

type AdminUserMetrics {
  totalUsers: Int!
  newUsersToday: Int!
  newUsersThisWeek: Int!
}

enum AdminUserStatus {
  ACTIVE
  DEACTIVATED
}

type AdminUser {
  id: ID!
  handle: String!
  displayName: String!
  bio: String
  avatarUrl: String
  createdAt: String!
  status: AdminUserStatus!
  deactivatedAt: String
  followersCount: Int!
  followingCount: Int!
}

type AdminUserEdge {
  node: AdminUser!
  cursor: String!
}

type AdminUserPageInfo {
  endCursor: String
  hasNextPage: Boolean!
}

type AdminUserConnection {
  edges: [AdminUserEdge!]!
  pageInfo: AdminUserPageInfo!
}

union _Entity = User

type Query {
  me: User
  userByHandle(handle: String!): User
  searchUsers(query: String!, limit: Int = 8): [User!]!
  searchUsersConnection(query: String!, after: String, limit: Int = 20): UserConnection!
  discoverUsers(limit: Int = 8): [User!]!
  adminUserMetrics: AdminUserMetrics!
  adminRecentUsers(limit: Int = 10): [AdminUser!]!
  adminUsers(query: String, status: AdminUserStatus, after: String, limit: Int = 20): AdminUserConnection!
}

type Mutation {
  updateProfile(displayName: String, bio: String, avatarKey: String, avatarAssetId: ID): User!
  followUser(userId: ID!): User!
  unfollowUser(userId: ID!): User!
  adminDeactivateUser(userId: ID!): AdminUser!
  adminReactivateUser(userId: ID!): AdminUser!
}

extend type Query {
  _entities(representations: [_Any!]!): [_Entity]!
}
